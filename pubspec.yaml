name: upamakal
description: "UPamakal - Your Campus, Your Marketplace. A campus marketplace app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons for iOS-style widgets
  cupertino_icons: ^1.0.8

  # Firebase core — foundation for all Firebase services
  # Adjusted to ^3.10.1 to be compatible with firebase_auth ^5.x
  firebase_core: ^3.10.1

  # Firebase Authentication — email/password + OAuth providers
  firebase_auth: ^5.5.2

  # Google Sign-In — native Google OAuth flow
  google_sign_in: ^6.3.0

  # SharedPreferences — lightweight key-value store for first-launch flag
  shared_preferences: ^2.3.5

  # Provider — lightweight state management for MVVM architecture
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets directory for logo and future images
  assets:
    - assets/images/